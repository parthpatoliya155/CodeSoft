<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Dark Calculator</title>
    <!-- Use Inter font for a modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500&display=swap" rel="stylesheet">
    <!-- Font Awesome for top menu icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <div class="calculator-container glass-effect">
        <!-- Top Menu Icons -->
        <div class="top-menu">
            <button class="menu-btn" title="History"><i class="fas fa-history"></i></button>
            <button class="menu-btn" title="Convert"><i class="fas fa-exchange-alt"></i></button>
            <button class="menu-btn" title="Currency"><i class="fas fa-coins"></i></button>
            <button class="menu-btn theme-toggle" title="Toggle Theme"><i class="fas fa-moon"></i></button>
            <button class="menu-btn" title="Compact"><i class="fas fa-compress-arrows-alt"></i></button>
        </div>
        
        <!-- Display Area -->
        <div class="display-container">
            <div class="previous-operand"></div>
            <div class="current-operand">0<span class="cursor">|</span></div>
        </div>
        
        <!-- 4-Column CSS Grid for Buttons -->
        <div class="buttons-grid">
            <button class="btn func" data-action="clear">AC</button>
            <button class="btn func" data-action="delete">⌫</button>
            <button class="btn func" data-action="percent">%</button>
            <button class="btn operator" data-action="divide">÷</button>
            
            <button class="btn number" data-number="7">7</button>
            <button class="btn number" data-number="8">8</button>
            <button class="btn number" data-number="9">9</button>
            <button class="btn operator" data-action="multiply">×</button>
            
            <button class="btn number" data-number="4">4</button>
            <button class="btn number" data-number="5">5</button>
            <button class="btn number" data-number="6">6</button>
            <button class="btn operator" data-action="subtract">−</button>
            
            <button class="btn number" data-number="1">1</button>
            <button class="btn number" data-number="2">2</button>
            <button class="btn number" data-number="3">3</button>
            <button class="btn operator" data-action="add">+</button>
            
            <button class="btn func" data-action="negate">+/-</button>
            <button class="btn number" data-number="0">0</button>
            <button class="btn number" data-number=".">.</button>
            <button class="btn operator calculate" data-action="calculate">=</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
